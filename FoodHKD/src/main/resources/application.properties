spring.application.name=FoodHKD
server.address=0.0.0.0
server.port=9090

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

logging.level.org.springframework.web=DEBUG

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=FOODTEAM;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.thymeleaf.encoding=UTF-8

jwt.secret=MyV3ryStr0ngS3cr3tK3yF0rJWT_Th1sIsV3ryS3cur3AndL0ng123456
jwt.expirationTime=3600000         

logging.level.org.apache.tomcat.websocket=DEBUG
logging.level.org.apache.coyote=DEBUG
logging.level.org.springframework.web.socket=DEBUG

server.tomcat.max-connections=5000
server.tomcat.threads.max=100
server.forward-headers-strategy=FRAMEWORK

# Ngrok Support - Trust headers from ngrok proxy
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
server.tomcat.remoteip.internal-proxies=.*

# WebSocket with ngrok
server.servlet.context-path=/
server.compression.enabled=true



